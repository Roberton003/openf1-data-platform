name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && secrets.SSH_HOST != '' }}


    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd /opt/openf1-data-platform || cd ~/openf1-data-platform
          git fetch origin master
          git reset --hard origin/master
          docker-compose down
          docker-compose up -d --build
          # Executa o pipeline de ingestão em lote para sincronizar as corridas de 2025
          docker-compose exec -T web make ingest-all
