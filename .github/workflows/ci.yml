name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Data Directories
      run: |
        mkdir -p data/bronze data/silver data/gold data/quarantine

    - name: Code Formatting Check (Black)
      run: |
        black --check src/ tests/

    - name: Import Sorting Check (Isort)
      run: |
        isort --check-only --profile black src/ tests/

    - name: Static Analysis & Lint (Flake8)
      run: |
        flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503,E501,W291,F841,F541 --exclude=src/dashboard/

    - name: Run Unit & Integration Tests (Pytest)
      run: |
        PYTHONPATH=. pytest tests/ -v
