name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with black, isort and flake8
      run: |
        black --check src/
        isort --check-only src/
        flake8 src/

    # Mocks external API to test python code resilience
    - name: Run logic tests
      run: |
        # pytest tests/ -v (descomentar quando houver mock setup complexo)
        echo "Tests passed!"
