version: '3.8'

services:
  dashboard:
    image: python:3.12-slim
    container_name: openf1_dashboard
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -r requirements.txt && streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0"
    environment:
      - PYTHONUNBUFFERED=1
